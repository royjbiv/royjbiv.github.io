<!DOCTYPE html>
<html>
  
<head>
  <title>Art Site</title>
  <style>
    body {
      background-image: url("https://live.staticflickr.com/65535/55302500046_b6c12ee2b9_b.jpg");
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: cover;
    }
  </style>

</head>

<body>

  <canvas id="textBacking" width="20000" height="6000"> </canvas>
  <script>
    var textBacking = document.getElementById("textBacking");
    var ctx = textBacking.getContext("2d");
    ctx.fillStyle = '#FFF8E7';
    ctx.globalAlpha = .75;
    ctx.fillRect(600,1000,3000,3000);
  </script>

  <svg width="100" height="100">
    <rect x="600" y="0" width="150" height="150"
      style="fill:#FFF8E7;opacity:0.9"/>
  </svg>
 
  

  <H1>This is a heading</H1>
  <p>This is a paragraph</p>
  
</body>





  
</html>
